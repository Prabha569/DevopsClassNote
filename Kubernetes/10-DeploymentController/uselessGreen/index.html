<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Useless Green Button Collection</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #e6fff2, #f0fff5);
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #28a745;
      font-size: 42px;
    }

    p {
      color: #555;
    }

    .btn-container {
      margin-top: 30px;
    }

    button {
      padding: 12px 22px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(to right, #28a745, #1e7e34);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button:hover {
      transform: scale(1.1);
      background: linear-gradient(to right, #1e7e34, #145c24);
    }

    .card {
      margin-top: 40px;
      padding: 25px;
      border-radius: 15px;
      background: #e6fff2;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
      display: inline-block;
    }

    footer {
      margin-top: 40px;
      color: #777;
    }
  </style>
</head>

<body>

  <h1>🌿 Useless Green Button Collection</h1>
  <p>Nature vibes... but still useless 😆</p>

  <div class="btn-container">
    <button onclick="alert('Still useless 😅')">DO NOT PRESS</button>
    <button onclick="alert('Calories burned: 0 😂')">Calorie Burner</button>
    <button onclick="wiggle()">Make Page Wiggle</button>
    <button onclick="alert('I am shy 🌱')">Shy Button</button>
    <br>
    <button onclick="alert('Nothing launched 🚀')">Launch Nothing</button>
    <button onclick="alert('You touched air 🤣')">Air Touch</button>
    <button onclick="alert('Out of Office 🌴')">Out of Office</button>
    <button onclick="alert('Still no purpose 😆')">Purpose Finder</button>
    <br>
    <button onclick="alert('Mystery = Nothing 🤡')">Mystery Summon</button>
    <button onclick="alert('You won nothing 🎉')">Win Nothing</button>
  </div>

  <div class="card">
    <h3>😂 Joke of the Moment</h3>
    <p id="joke">Click below for joke</p>
    <button onclick="newJoke()">Get Joke</button>
  </div>

  <footer>
    💚 Powered by Green Energy — 2026
  </footer>

  <script>
    function wiggle() {
      document.body.style.transform = "rotate(2deg)";
      setTimeout(() => {
        document.body.style.transform = "rotate(-2deg)";
      }, 100);

      setTimeout(() => {
        document.body.style.transform = "rotate(0deg)";
      }, 200);
    }

    function newJoke() {
      const jokes = [
        "Why do programmers love green? Because it's always 'go' 😎",
        "Why did dev go outside? To debug nature 🌿",
        "Why code failed? Missing semicolon 😂",
        "Why frontend dev happy? CSS finally worked 🎉"
      ];

      document.getElementById("joke").innerText =
        jokes[Math.floor(Math.random() * jokes.length)];
    }
  </script>

</body>
</html>
