<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hello Dhondhu 😂</title>

    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 100px;
            font-size: 60px;
            color: #fff;
            font-weight: bold;
            animation: bounce 1s infinite alternate;
        }

        img {
            margin-top: 30px;
            width: 250px;
            border-radius: 20px;
            box-shadow: 0 0 20px black;
        }

        p {
            font-size: 25px;
            color: #333;
            margin-top: 20px;
        }

        @keyframes bounce {
            from { transform: translateY(0px); }
            to { transform: translateY(-20px); }
        }
    </style>
</head>

<body>

    <h1>😂 Hello Dhondhu 😂</h1>

    <!-- Replace image URL below -->
    <img src="dhondhu.jpg" alt="Dhondhu Photo">

    <p>🔥 Dhondhu is watching you... Run bro RUN! 🏃‍♂️💨</p>

</body>
</html>
