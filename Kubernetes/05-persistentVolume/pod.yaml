apiVersion: v1
kind: Pod
metadata:
  name: my-pod
spec:
  volumes:
  - name: nipun-volume
    persistentVolumeClaim:
      claimName: my-pvc
  containers:
  - name: my-container
    image: nginx
    ports:
      - containerPort: 80
    volumeMounts:
    - name: nipun-volume
      mountPath: /data
      
